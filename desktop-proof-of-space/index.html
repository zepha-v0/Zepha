<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zepha Proof of Space</title>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(8, 18, 56, 0.78);
        --panel-border: rgba(148, 163, 184, 0.22);
        --text: #dbeafe;
        --muted: #94a3b8;
        --active: rgba(125, 211, 252, 0.28);
        --active-border: rgba(186, 230, 253, 0.58);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      body {
        display: flex;
        align-items: stretch;
        justify-content: stretch;
      }

      .shell {
        position: relative;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .hud {
        position: absolute;
        left: 8px;
        right: 8px;
        top: 8px;
        padding: 10px;
        border-radius: 16px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(14px);
        pointer-events: auto;
      }

      .hud-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .title {
        color: var(--text);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .close {
        border: 0;
        background: rgba(148, 163, 184, 0.16);
        color: var(--text);
        border-radius: 999px;
        width: 22px;
        height: 22px;
        cursor: pointer;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .button {
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(15, 23, 42, 0.66);
        color: var(--text);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 11px;
        cursor: pointer;
      }

      .button[data-active="true"] {
        background: var(--active);
        border-color: var(--active-border);
      }

      .meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 11px;
      }

      .zepha-zone {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 92px;
        pointer-events: none;
      }

      .ground-line {
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: 10px;
        height: 1px;
        background: linear-gradient(
          90deg,
          rgba(148, 163, 184, 0),
          rgba(148, 163, 184, 0.35),
          rgba(148, 163, 184, 0)
        );
      }

      .zepha {
        position: absolute;
        left: 18px;
        bottom: 0;
        width: 86px;
        height: 86px;
        display: grid;
        place-items: center;
        filter: drop-shadow(0 12px 18px rgba(8, 15, 32, 0.42));
      }

      .body {
        width: 62px;
        height: 62px;
        border-radius: 999px;
        background:
          radial-gradient(circle at 36% 32%, rgba(255,255,255,0.42), rgba(255,255,255,0) 26%),
          radial-gradient(circle at 50% 50%, rgba(110, 168, 255, 0.92), rgba(36, 83, 161, 0.96));
        border: 1px solid rgba(191, 219, 254, 0.34);
        display: grid;
        place-items: center;
        color: white;
        font-size: 26px;
      }

      .state-pill {
        position: absolute;
        bottom: 68px;
        left: 74px;
        padding: 5px 8px;
        border-radius: 999px;
        background: rgba(8, 18, 56, 0.88);
        border: 1px solid rgba(148, 163, 184, 0.18);
        color: var(--text);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hud">
        <div class="hud-top">
          <div class="title">Zepha Proof of Space</div>
          <button class="close" id="closeButton" type="button">×</button>
        </div>
        <div class="row" id="buttons"></div>
        <div class="meta" id="metaText"></div>
      </section>

      <section class="zepha-zone">
        <div class="state-pill" id="statePill">idle</div>
        <div class="ground-line"></div>
        <div class="zepha">
          <div class="body">✦</div>
        </div>
      </section>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
